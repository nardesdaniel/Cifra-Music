<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="login-body">
    <div class="login-container">
        <h2>Login do Sistema</h2>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        <div class="mensagens">
            {% for categoria, mensagem in messages %}
            <div class="flash {{ categoria }}">
                {{ mensagem }}
                <div class="barra"></div>
            </div>
            {% endfor %}
        </div>
        {% endif %}
        {% endwith %}

        <!-- Login -->

        <form method="POST" action="/login_admin">
            <label for="usuario">Usuário:</label>
            <input type="text" name="usuario" id="usuario" required>

            <label for="senha">Senha:</label>
            <input type="password" name="senha" id="senha" required>

            <button type="submit">Entrar</button>
        </form>
        <p>Não tem uma conta? <a class="cadastro-link" href="/usuario_cliente">Cadastre-se</a></p>
    </div>

        <!-- Script para animação da barra de progresso -->
    <script>
        document.querySelectorAll(".flash").forEach(flash => {
            let bar = flash.querySelector(".barra");
            let width = 0;

            let timer = setInterval(() => {
                width++;
                bar.style.width = width + "%";

                if (width >= 100) {
                    clearInterval(timer);
                    flash.style.transition = "0.4s";
                    flash.style.opacity = 0;
                    setTimeout(() => flash.remove(), 400);
                }
            }, 40); // tempo (40 = ~4 segundos)
        });

    </script>
</body>

</html>
