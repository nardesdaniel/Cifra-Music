{% extends "admin.html" %}

{% block content %}
<section class="form-section">
    <h2>Editar Dados Pessoais</h2>

    <form method="POST" class="form-card">
        <label for="nome">Nome:</label>
        <input type="text" id="nome" name="nome" value="{{ item.nome }}" required>
        
        <label for="email">E-mail:</label>
        <input type="email" id="email" name="email" value="{{ item.email }}" required>
        
        <label for="telefone">Telefone:</label>
        <input type="text" id="telefone" name="telefone" value="{{ item.telefone }}" required pattern="[0-9]{8,}">
        
        <div class="botoes-editar">
            <button type="submit" class="btn-alterar">Salvar</button>
            <a href="{{ url_for('listar') }}" class="btn-cancelar">Cancelar</a>
        </div>
    </form>
</section>
{% endblock %}
